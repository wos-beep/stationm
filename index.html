<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程ステーション管理 v1.0.1</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #bb86fc;
            --border-color: #333;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .clock-box {
            text-align: right;
            font-family: 'Courier New', Courier, monospace;
            background: #000;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid var(--accent-color);
            min-width: 250px;
        }

        .clock-line {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            line-height: 1.4;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            background: #252525;
            padding: 15px;
            border-radius: 8px;
        }

        .station-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .station-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-left: 6px solid #ccc;
            padding: 15px;
            border-radius: 6px;
        }

        .time-display {
            margin: 10px 0;
            padding: 8px;
            background: rgba(0,0,0,0.4);
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .countdown {
            font-size: 1.3rem;
            font-weight: bold;
            color: #ff5252;
            margin-bottom: 10px;
            font-family: monospace;
        }

        .btn {
            cursor: pointer;
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            background: #444;
            color: white;
            font-size: 0.9rem;
        }

        .btn:hover { background: #555; }
        .btn-start { background: #2e7d32; width: 100%; font-weight: bold; }
        .btn-reset { background: #c62828; }
        .btn-adjust { background: #1565c0; padding: 4px 8px; font-size: 0.75rem; }

        .filter-btn {
            border: 1px solid transparent;
            opacity: 0.4;
            transition: 0.3s;
        }
        .filter-btn.active {
            opacity: 1;
            border-color: white;
            box-shadow: 0 0 5px rgba(255,255,255,0.2);
        }

        #io-section {
            margin-top: 40px;
            padding: 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>

<header>
    <h2>工程ステーション管理 <small style="font-size: 0.6em; color: #888;">v1.0.1</small></h2>
    <div class="clock-box">
        <div class="clock-line"><span>JST:</span> <span id="jst-clock">取得中...</span></div>
        <div class="clock-line"><span>UTC:</span> <span id="utc-clock">取得中...</span></div>
    </div>
</header>

<div class="controls">
    <div style="width: 100%; margin-bottom: 8px; font-size: 0.9rem; color: #bbb;">表示するステーションを選択:</div>
    <div id="filter-container" style="display: flex; gap: 8px; flex-wrap: wrap;"></div>
</div>

<div class="station-grid" id="station-list">
    </div>

<div id="io-section">
    <button class="btn" onclick="exportData()">データをエクスポート</button>
    <button class="btn" onclick="document.getElementById('import-file').click()">インポート</button>
    <input type="file" id="import-file" style="display:none" onchange="importData(event)">
</div>

<script>
// --- 設定・データ ---
const STORAGE_VERSION = "1.0.1";
const PROTECT_DURATION = 72 * 60 * 60 * 1000;

const stationData = {
    "construction": { "name": "建築", "color": "#FF5252", "coords": [ {"x": 1068, "y": 138, "lv": 1}, {"x": 537, "y": 138, "lv": 1}, {"x": 138, "y": 138, "lv": 1}, {"x": 138, "y": 666, "lv": 1}, {"x": 138, "y": 1038, "lv": 1}, {"x": 666, "y": 1068, "lv": 1}, {"x": 1068, "y": 567, "lv": 1}, {"x": 1068, "y": 1068, "lv": 1}, {"x": 486, "y": 327, "lv": 3}, {"x": 768, "y": 867, "lv": 3}, {"x": 867, "y": 567, "lv": 3}, {"x": 327, "y": 666, "lv": 3} ] },
    "defense": { "name": "防御", "color": "#448AFF", "coords": [ {"x": 666, "y": 138, "lv": 2}, {"x": 438, "y": 267, "lv": 2}, {"x": 138, "y": 537, "lv": 2}, {"x": 237, "y": 768, "lv": 2}, {"x": 537, "y": 1038, "lv": 2}, {"x": 738, "y": 957, "lv": 2}, {"x": 1068, "y": 666, "lv": 2}, {"x": 957, "y": 438, "lv": 2}, {"x": 567, "y": 327, "lv": 3}, {"x": 327, "y": 567, "lv": 3}, {"x": 633, "y": 867, "lv": 3}, {"x": 867, "y": 633, "lv": 3} ] },
    "tech": { "name": "技術", "color": "#FFEB3B", "coords": [ {"x": 957, "y": 237, "lv": 1}, {"x": 666, "y": 267, "lv": 1}, {"x": 237, "y": 237, "lv": 1}, {"x": 267, "y": 537, "lv": 1}, {"x": 237, "y": 957, "lv": 1}, {"x": 537, "y": 936, "lv": 1}, {"x": 936, "y": 537, "lv": 1}, {"x": 957, "y": 537, "lv": 1}, {"x": 408, "y": 327, "lv": 3}, {"x": 327, "y": 408, "lv": 3}, {"x": 792, "y": 867, "lv": 3}, {"x": 867, "y": 792, "lv": 3} ] },
    "weapon": { "name": "武器", "color": "#E040FB", "coords": [ {"x": 867, "y": 138, "lv": 2}, {"x": 366, "y": 138, "lv": 2}, {"x": 138, "y": 438, "lv": 2}, {"x": 138, "y": 867, "lv": 2}, {"x": 327, "y": 1068, "lv": 2}, {"x": 867, "y": 1068, "lv": 2}, {"x": 1068, "y": 327, "lv": 2}, {"x": 1068, "y": 867, "lv": 2} ] },
    "gathering": { "name": "採取", "color": "#4CAF50", "coords": [ {"x": 768, "y": 138, "lv": 1}, {"x": 450, "y": 138, "lv": 1}, {"x": 138, "y": 327, "lv": 1}, {"x": 138, "y": 768, "lv": 1}, {"x": 438, "y": 1068, "lv": 1}, {"x": 738, "y": 1068, "lv": 1}, {"x": 1068, "y": 438, "lv": 1}, {"x": 1068, "y": 738, "lv": 1} ] },
    "production": { "name": "生産", "color": "#FF9800", "coords": [ {"x": 267, "y": 438, "lv": 2}, {"x": 438, "y": 237, "lv": 2}, {"x": 768, "y": 237, "lv": 2}, {"x": 936, "y": 408, "lv": 2}, {"x": 936, "y": 792, "lv": 2}, {"x": 768, "y": 963, "lv": 2}, {"x": 438, "y": 963, "lv": 2}, {"x": 267, "y": 768, "lv": 2} ] },
    "training": { "name": "訓練", "color": "#795548", "coords": [ {"x": 366, "y": 267, "lv": 1}, {"x": 837, "y": 267, "lv": 1}, {"x": 936, "y": 666, "lv": 1}, {"x": 837, "y": 936, "lv": 1}, {"x": 366, "y": 936, "lv": 1}, {"x": 267, "y": 666, "lv": 1} ] },
    "expedition": { "name": "遠征", "color": "#607D8B", "coords": [ {"x": 537, "y": 267, "lv": 2}, {"x": 936, "y": 327, "lv": 2}, {"x": 666, "y": 936, "lv": 2}, {"x": 267, "y": 867, "lv": 2} ] }
};

let userState = {
    version: STORAGE_VERSION,
    activeTypes: ["construction", "defense"], // 初期値
    timers: {}
};

// --- 関数 ---

function updateClocks() {
    const now = new Date();
    // JST (LocaleStringはブラウザ設定に従うが、基本日本ならJST)
    document.getElementById('jst-clock').innerText = now.toLocaleString('ja-JP');
    // UTC
    document.getElementById('utc-clock').innerText = now.toISOString().replace('T', ' ').substring(0, 19);
}

function renderFilters() {
    const container = document.getElementById('filter-container');
    container.innerHTML = '';
    Object.keys(stationData).forEach(key => {
        const btn = document.createElement('button');
        const isActive = userState.activeTypes.includes(key);
        btn.className = `btn filter-btn ${isActive ? 'active' : ''}`;
        btn.style.backgroundColor = isActive ? stationData[key].color : '#333';
        btn.style.color = isActive ? '#000' : '#fff';
        btn.innerText = stationData[key].name;
        btn.onclick = () => {
            if (userState.activeTypes.includes(key)) {
                userState.activeTypes = userState.activeTypes.filter(k => k !== key);
            } else {
                userState.activeTypes.push(key);
            }
            saveData();
            renderFilters();
            renderStations();
        };
        container.appendChild(btn);
    });
}

function renderStations() {
    const list = document.getElementById('station-list');
    list.innerHTML = '';

    Object.keys(stationData).forEach(typeKey => {
        if (!userState.activeTypes.includes(typeKey)) return;

        const info = stationData[typeKey];
        info.coords.forEach((coord, idx) => {
            const id = `${typeKey}-${idx}`;
            const card = document.createElement('div');
            card.className = 'station-card';
            card.style.borderLeftColor = info.color;

            const startTime = userState.timers[id];
            let timeHtml = '';

            if (startTime) {
                const endTime = startTime + PROTECT_DURATION;
                const endJST = new Date(endTime).toLocaleString('ja-JP');
                const endUTC = new Date(endTime).toISOString().replace('T', ' ').substring(0, 16);
                
                timeHtml = `
                    <div class="time-display">
                        終了 JST: ${endJST}<br>
                        終了 UTC: ${endUTC}
                    </div>
                    <div class="countdown" id="count-${id}">--:--:--</div>
                    <div style="display:flex; gap:5px;">
                        <button class="btn btn-adjust" onclick="adjustTime('${id}', -60000)">-1分</button>
                        <button class="btn btn-adjust" onclick="adjustTime('${id}', 60000)">+1分</button>
                        <button class="btn btn-reset" style="margin-left:auto" onclick="resetTimer('${id}')">解除</button>
                    </div>
                `;
            } else {
                timeHtml = `<button class="btn btn-start" onclick="startTimer('${id}')">保護開始 (72h)</button>`;
            }

            card.innerHTML = `
                <div style="font-weight:bold; font-size:1.1rem; margin-bottom:5px;">${info.name} Lv.${coord.lv}</div>
                <div style="color:#aaa; margin-bottom:10px;">座標: (${coord.x}, ${coord.y})</div>
                ${timeHtml}
            `;
            list.appendChild(card);
        });
    });
}

function startTimer(id) {
    userState.timers[id] = Date.now();
    saveData();
    renderStations();
}

function resetTimer(id) {
    if(confirm("タイマーを解除しますか？")) {
        delete userState.timers[id];
        saveData();
        renderStations();
    }
}

function adjustTime(id, ms) {
    if(userState.timers[id]) {
        userState.timers[id] += ms;
        saveData();
        renderStations();
    }
}

function updateTimers() {
    const now = Date.now();
    Object.keys(userState.timers).forEach(id => {
        const el = document.getElementById(`count-${id}`);
        if (!el) return;

        const diff = (userState.timers[id] + PROTECT_DURATION) - now;
        if (diff <= 0) {
            el.innerText = "保護終了";
            el.style.color = "#888";
        } else {
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            el.innerText = `${h}h ${m}m ${s}s`;
        }
    });
}

function saveData() {
    localStorage.setItem('wos_station_state', JSON.stringify(userState));
}

function loadData() {
    const saved = localStorage.getItem('wos_station_state');
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            userState = Object.assign(userState, parsed);
        } catch(e) { console.error("Load error", e); }
    }
}

function exportData() {
    const blob = new Blob([JSON.stringify(userState, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `wos_backup_${new Date().getTime()}.json`;
    a.click();
}

function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
        try {
            userState = JSON.parse(event.target.result);
            saveData();
            renderFilters();
            renderStations();
        } catch(err) { alert("無効なファイルです"); }
    };
    reader.readAsText(file);
}

// --- 起動 ---
window.onload = () => {
    loadData();
    renderFilters();
    renderStations();
    updateClocks();
    setInterval(updateClocks, 1000);
    setInterval(updateTimers, 1000);
};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[v2.8.6] 施設管理</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #ff5252; --own: #448AFF; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn { cursor: pointer; padding: 15px; border: none; border-radius: 8px; background: #444; color: white; font-weight: bold; }
        .station-card { background: var(--card); padding: 15px; border-radius: 10px; border-left: 8px solid #555; margin-bottom: 10px; }
        .station-card.own { border-color: var(--own); }
        .station-card.enemy { border-color: var(--accent); }
    </style>
</head>
<body>

<div class="controls">
    <button class="btn" style="background:#2e7d32;" onclick="showModal()">＋ 追加</button>
    <button class="btn" onclick="shareURL()">🔗 共有リンク</button>
    <button class="btn" onclick="exportData()">💾 保存</button>
    <button class="btn" onclick="document.getElementById('file-input').click()">📂 読込</button>
    <input type="file" id="file-input" style="display:none" onchange="importData(event)">
</div>

<div id="station-list"></div>

<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:999; overflow-y:auto;">
    <div style="padding:20px;">
        <button class="btn" style="width:100%; margin-bottom:20px;" onclick="hideModal()">閉じる</button>
        <div id="modal-list"></div>
    </div>
</div>

<script>
const MASTER_DATA = { "construction": { "name": "建築", "coords": [{x:1068,y:138,lv:1},{x:537,y:138,lv:1}] }, "defense": { "name": "防御", "coords": [{x:666,y:138,lv:2}] } };
const ALL_STATIONS = []; Object.entries(MASTER_DATA).forEach(([k, cat]) => { cat.coords.forEach((c, i) => ALL_STATIONS.push({ id:`${k}-${c.lv}-${i}`, typeKey:k, typeName:cat.name, lv:c.lv, x:c.x, y:c.y })); });
let userState = { selectedIds: [], timers: {}, modes: {} };

function render() {
    const list = document.getElementById('station-list'); list.innerHTML = '';
    userState.selectedIds.forEach(id => {
        const s = ALL_STATIONS.find(x => x.id === id);
        if(!s) return;
        const card = document.createElement('div'); card.className = `station-card ${userState.modes[id] || ''}`;
        card.innerHTML = `<div>${s.typeName} Lv.${s.lv}</div><button class="btn" onclick="removeStation('${id}')">削除</button>`;
        list.appendChild(card);
    });
}

function importData(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const imported = JSON.parse(ev.target.result);
        // 過去バージョンとの互換性確保
        userState = { 
            selectedIds: imported.selectedIds || [], 
            timers: imported.timers || {}, 
            modes: imported.modes || {} 
        };
        render();
    };
    reader.readAsText(e.target.files[0]);
}

function showModal() { document.getElementById('modal').style.display = 'block'; }
function hideModal() { document.getElementById('modal').style.display = 'none'; }
function addStation(id) { userState.selectedIds.push(id); render(); hideModal(); }
function removeStation(id) { userState.selectedIds = userState.selectedIds.filter(x => x !== id); render(); }

window.onload = () => {
    const list = document.getElementById('modal-list');
    ALL_STATIONS.forEach(s => {
        const d = document.createElement('div');
        d.style = "padding:20px; border-bottom:1px solid #444; cursor:pointer;";
        d.innerText = `${s.typeName} Lv.${s.lv} (${s.x},${s.y})`;
        d.onclick = () => addStation(s.id);
        list.appendChild(d);
    });
};
</script>
</body>
</html>

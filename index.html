<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程ステーション管理 v1.9.0</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --txt: #e0e0e0; --accent: #bb86fc; --brd: #333; --enemy: #b71c1c; }
        body { font-family: sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 20px; line-height: 1.4; padding-bottom: 200px; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--brd); padding-bottom: 10px; margin-bottom: 20px; }
        .clock-box { background: #000; padding: 10px; border: 1px solid var(--accent); border-radius: 5px; font-family: monospace; font-size: 0.85rem; }
        .controls { background: #252525; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .io-section { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
        .filter-item { display: flex; align-items: center; background: #333; border-radius: 4px; overflow: hidden; }
        .filter-btn { cursor: pointer; padding: 6px 10px; border: none; color: white; font-size: 0.7rem; }
        .filter-btn.active { color: #000; font-weight: bold; }
        .station-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 15px; }
        .station-card { background: var(--card); border: 1px solid var(--brd); border-left: 6px solid #ccc; padding: 15px; border-radius: 6px; position: relative; }
        .station-card.enemy { border-color: var(--enemy); background: linear-gradient(145deg, #1e1e1e, #2c0000); box-shadow: 0 0 10px rgba(255,0,0,0.2); }
        .countdown { font-size: 1.6rem; font-weight: bold; color: #ff5252; margin: 5px 0; font-family: monospace; }
        .enemy .countdown { color: #ff8a80; }
        .btn { cursor: pointer; padding: 6px 10px; border: none; border-radius: 4px; background: #444; color: white; font-size: 0.8rem; }
        .btn-enemy-toggle { font-size: 0.65rem; padding: 2px 6px; margin-bottom: 5px; background: #333; border: 1px solid #555; }
        .enemy .btn-enemy-toggle { background: var(--enemy); border-color: #ff5252; }
        
        /* サマリーエリア */
        .summary-panel { position: fixed; bottom: 0; left: 0; right: 0; background: #222; border-top: 2px solid var(--accent); padding: 15px; max-height: 180px; overflow-y: auto; z-index: 100; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
        .summary-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .summary-list { font-size: 0.85rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 5px; }
        .summary-item { background: #333; padding: 4px 8px; border-radius: 3px; display: flex; justify-content: space-between; }
        .summary-item.warn { color: #ff5252; font-weight: bold; border-left: 3px solid #ff5252; }
        .close-card { position: absolute; top: 10px; right: 10px; color: #888; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h2>工程管理 <small style="font-size:0.5em; color:#888;">v1.9.0 (敵同盟管理&サマリー)</small></h2>
    <div class="clock-box">
        <div id="jst">JST: --</div>
        <div id="utc">UTC: --</div>
    </div>
</header>

<div class="controls">
    <div class="io-section">
        <button class="btn" style="background:#4527a0" onclick="exportData()">保存</button>
        <button class="btn" style="background:#4527a0" onclick="document.getElementById('import-file').click()">読込</button>
        <button class="btn" style="background:#00897b" onclick="shareURL()">URL共有</button>
        <button class="btn" style="font-size:0.7rem; margin-left:auto" onclick="resetHiddenAll()">全非表示解除</button>
        <input type="file" id="import-file" style="display:none" onchange="importData(event)">
    </div>
    <div id="filter-container" class="filter-group"></div>
</div>

<div class="station-grid" id="station-list"></div>

<div class="summary-panel" id="summary-panel">
    <div class="summary-header">
        <strong style="color:var(--accent)">⏳ 終了間近サマリー (72時間保護)</strong>
        <button class="btn" style="font-size:0.7rem; background:#1565c0" onclick="copySummaryText()">テキストとしてコピー</button>
    </div>
    <div class="summary-list" id="summary-list"></div>
</div>

<script>
const MASTER_DATA = {
    "construction": { "name": "建築", "color": "#FF5252", "coords": [{"x": 1068, "y": 138, "lv": 1}, {"x": 486, "y": 327, "lv": 3}] },
    "defense": { "name": "防御", "color": "#448AFF", "coords": [{"x": 666, "y": 138, "lv": 2}, {"x": 816, "y": 717, "lv": 4}] },
    "tech": { "name": "技術", "color": "#FFEB3B", "coords": [{"x": 957, "y": 237, "lv": 1}, {"x": 867, "y": 327, "lv": 3}] },
    "weapon": { "name": "武器", "color": "#E040FB", "coords": [{"x": 867, "y": 138, "lv": 2}, {"x": 816, "y": 486, "lv": 4}] },
    "gathering": { "name": "採取", "color": "#4CAF50", "coords": [{"x": 957, "y": 138, "lv": 1}] },
    "production": { "name": "生産", "color": "#FF9800", "coords": [{"x": 1068, "y": 237, "lv": 1}] },
    "training": { "name": "訓練", "color": "#795548", "coords": [{"x": 237, "y": 486, "lv": 2}, {"x": 366, "y": 267, "lv": 1}] },
    "expedition": { "name": "遠征", "color": "#607D8B", "coords": [{"x": 768, "y": 327, "lv": 3}, {"x": 537, "y": 267, "lv": 2}] },
    "refining": { "name": "精錬", "color": "#00BCD4", "coords": [{"x": 666, "y": 588, "lv": 4}, {"x": 462, "y": 588, "lv": 5}] }
};

const FILTER_LIST = [];
Object.entries(MASTER_DATA).forEach(([typeKey, val]) => {
    const lvs = [...new Set(val.coords.map(c => c.lv))].sort();
    lvs.forEach(lv => FILTER_LIST.push({ key: `${typeKey}-${lv}`, type: typeKey, lv: lv, name: `${val.name} Lv.${lv}`, color: val.color }));
});

// enemyFlag: { id: true/false } を追加
let userState = { active: [], timers: {}, hidden: [], enemyFlags: {} };
const DUR = 72 * 60 * 60 * 1000;
const STORAGE_KEY = 'wos_station_manager_data';

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(userState)); }
function load() {
    const params = new URLSearchParams(window.location.search);
    const sharedData = params.get('d');
    if (sharedData && confirm("共有データを読み込みますか？")) {
        try { userState = JSON.parse(decodeURIComponent(atob(sharedData))); save(); } catch(e){}
    } else {
        const s = localStorage.getItem(STORAGE_KEY);
        if(s) userState = JSON.parse(s);
        if(!userState.enemyFlags) userState.enemyFlags = {};
        if(userState.active.length === 0) userState.active = FILTER_LIST.map(f => f.key);
    }
}

function render() {
    const f = document.getElementById('filter-container');
    f.innerHTML = '';
    FILTER_LIST.forEach(item => {
        const wrap = document.createElement('div'); wrap.className = 'filter-item';
        const btn = document.createElement('button');
        const act = userState.active.includes(item.key);
        btn.className = `filter-btn ${act?'active':''}`;
        btn.style.backgroundColor = act ? item.color : '#333';
        btn.innerText = item.name;
        btn.onclick = () => { userState.active = act ? userState.active.filter(x=>x!==item.key) : [...userState.active, item.key]; save(); render(); };
        wrap.appendChild(btn); f.appendChild(wrap);
    });

    const l = document.getElementById('station-list');
    l.innerHTML = '';
    FILTER_LIST.forEach(item => {
        if (!userState.active.includes(item.key)) return;
        MASTER_DATA[item.type].coords.filter(c => c.lv === item.lv).forEach((c, i) => {
            const id = `${item.type}-${item.lv}-${i}`;
            if (userState.hidden.includes(id)) return;
            const isEnemy = !!userState.enemyFlags[id];
            const t = userState.timers[id];
            
            const card = document.createElement('div');
            card.className = `station-card ${isEnemy?'enemy':''}`;
            if(!isEnemy) card.style.borderLeftColor = item.color;

            let content = `
                <span class="close-card" onclick="hideCard('${id}')">&times;</span>
                <button class="btn-enemy-toggle" onclick="toggleEnemy('${id}')">${isEnemy?'🚩 敵同盟が保持':'🏠 自同盟が保持'}</button>
                <div style="font-weight:bold">${item.name} <small>(${c.x}, ${c.y})</small></div>
            `;

            if (t) {
                const label = isEnemy ? "争奪開始まで" : "保護終了まで";
                content += `
                    <div style="font-size:0.7rem; margin-top:5px; opacity:0.8">${label}</div>
                    <div class="countdown" id="t-${id}">--:--:--</div>
                    <div style="display:flex; gap:5px;">
                        <button class="btn" style="background:#0277bd" onclick="syncTimer('${id}')">同期</button>
                        <button class="btn" style="background:#c62828; margin-left:auto;" onclick="reset('${id}')">解除</button>
                    </div>
                `;
            } else {
                content += `<button class="btn" style="background:#2e7d32; width:100%; margin-top:10px;" onclick="start('${id}')">保護開始 (72h)</button>`;
            }
            card.innerHTML = content;
            l.appendChild(card);
        });
    });
}

function toggleEnemy(id) { userState.enemyFlags[id] = !userState.enemyFlags[id]; save(); render(); }
function start(id) { userState.timers[id] = Date.now(); save(); render(); }
function reset(id) { if(confirm('解除しますか？')) { delete userState.timers[id]; save(); render(); } }
function hideCard(id) { userState.hidden.push(id); save(); render(); }
function resetHiddenAll() { userState.hidden = []; save(); render(); }

function syncTimer(id) {
    const input = prompt("残り時間を入力 (例: 1d 09:11:27)", "");
    if (!input) return;
    let totalSeconds = 0;
    const dayMatch = input.match(/(\d+)d/i);
    if (dayMatch) totalSeconds += parseInt(dayMatch[1]) * 86400;
    const timePart = input.replace(/\d+d/i, '').trim();
    const parts = timePart.replace(/[:：\s]/g, ' ').trim().split(/\s+/);
    let h=0, m=0, s=0;
    if (parts.length === 3) { h=parseInt(parts[0]); m=parseInt(parts[1]); s=parseInt(parts[2]); }
    else if (parts.length === 2) { h=parseInt(parts[0]); m=parseInt(parts[1]); }
    else if (parts.length === 1 && parts[0]!=="") { h=parseInt(parts[0]); }
    totalSeconds += (h * 3600) + (m * 60) + s;
    userState.timers[id] = Date.now() + (totalSeconds * 1000) - DUR;
    save(); render();
}

function updateSummary() {
    const list = document.getElementById('summary-list');
    const timers = [];
    Object.keys(userState.timers).forEach(id => {
        const diff = (userState.timers[id] + DUR) - Date.now();
        const [type, lv] = id.split('-');
        const name = `${MASTER_DATA[type].name} Lv.${lv}`;
        const isEnemy = !!userState.enemyFlags[id];
        timers.push({ id, name, diff, isEnemy, endTime: userState.timers[id] + DUR });
    });

    timers.sort((a, b) => a.diff - b.diff);
    list.innerHTML = timers.map(t => {
        const h = Math.floor(Math.max(0, t.diff)/3600000);
        const m = Math.floor((Math.max(0, t.diff)%3600000)/60000);
        const warnClass = t.diff < 3600000 ? 'warn' : ''; // 1時間未満で赤く
        return `<div class="summary-item ${warnClass}">
            <span>${t.isEnemy?'[敵]':'[自]'} ${t.name}</span>
            <span>残り ${h}h ${m}m</span>
        </div>`;
    }).join('');
}

function copySummaryText() {
    const timers = [];
    Object.keys(userState.timers).forEach(id => {
        const diff = (userState.timers[id] + DUR) - Date.now();
        const [type, lv] = id.split('-');
        const name = `${MASTER_DATA[type].name} Lv.${lv}`;
        const isEnemy = !!userState.enemyFlags[id];
        const ed = new Date(userState.timers[id] + DUR);
        const endStr = `${ed.getMonth()+1}/${ed.getDate()} ${ed.getHours()}:${ed.getMinutes().toString().padStart(2,'0')}`;
        timers.push({ name, diff, isEnemy, endStr });
    });
    timers.sort((a, b) => a.diff - b.diff);
    
    let text = "【ステーション保護状況】\n";
    timers.forEach(t => {
        const h = Math.floor(Math.max(0, t.diff)/3600000);
        const m = Math.floor((Math.max(0, t.diff)%3600000)/60000);
        text += `${t.isEnemy?'●敵':'○自'} ${t.name}: 残り ${h}h ${m}m (終了: ${t.endStr})\n`;
    });
    
    navigator.clipboard.writeText(text).then(() => alert("サマリーをコピーしました。"));
}

function tick() {
    const n = new Date();
    document.getElementById('jst').innerText = 'JST: ' + n.toLocaleString('ja-JP');
    document.getElementById('utc').innerText = 'UTC: ' + n.toISOString().replace('T',' ').substring(0,19);
    Object.keys(userState.timers).forEach(id => {
        const el = document.getElementById(`t-${id}`);
        if(!el) return;
        const diff = (userState.timers[id] + DUR) - Date.now();
        if(diff <= 0) { el.innerText = "終了"; el.style.color = "#888"; }
        else {
            const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
            el.innerText = `${h}h ${m}m ${s}s`;
        }
    });
    updateSummary();
}

function shareURL() {
    const base64 = btoa(encodeURIComponent(JSON.stringify(userState)));
    const url = new URL(window.location.href);
    url.searchParams.set('d', base64);
    navigator.clipboard.writeText(url.href).then(() => alert("共有URLをコピーしました。"));
}
function exportData() {
    const blob = new Blob([JSON.stringify(userState)], {type: 'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `wos_data.json`; a.click();
}
function importData(e) {
    const reader = new FileReader();
    reader.onload = (event) => { userState = JSON.parse(event.target.result); save(); render(); };
    reader.readAsText(e.target.files[0]);
}
window.onload = () => { load(); render(); setInterval(tick, 1000); };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[v2.8.0] 工程ステーション管理 - Gantt Chart</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --txt: #e0e0e0; --accent: #ff5252; --own: #448AFF; --enemy: #ff5252; --grid: #333; }
        body { font-family: sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 10px; padding-bottom: 260px; }
        
        .controls { background: #222; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #444; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; position: sticky; top: 5px; z-index: 1000; }
        .btn { cursor: pointer; padding: 10px 15px; border: none; border-radius: 6px; background: #444; color: white; font-weight: bold; font-size: 0.9rem; }
        .btn-add { background: #2e7d32; }

        /* ガントチャート構造 */
        .gantt-container { 
            background: #1a1a1a; border: 1px solid #444; border-radius: 8px; overflow: hidden; margin-bottom: 20px;
            display: flex; flex-direction: column;
        }
        .gantt-header-row { display: flex; background: #252525; border-bottom: 1px solid #444; }
        .gantt-label-col { width: 100px; flex-shrink: 0; border-right: 1px solid #444; padding: 8px; font-size: 0.7rem; font-weight: bold; background: #252525; z-index: 10; position: sticky; left: 0; }
        .gantt-time-viewport { flex-grow: 1; overflow-x: auto; position: relative; }
        .gantt-time-canvas { position: relative; height: 100%; min-width: 1680px; /* 240px * 7days */ }
        
        .gantt-day-header { display: flex; }
        .gantt-day-cell { width: 240px; text-align: center; border-right: 1px solid #333; font-size: 0.75rem; padding: 5px 0; flex-shrink: 0; }
        
        .gantt-row { display: flex; border-bottom: 1px solid #2a2a2a; height: 34px; align-items: center; }
        .bar-protect { position: absolute; height: 18px; border-radius: 4px; z-index: 3; font-size: 0.6rem; color: white; display: flex; align-items: center; padding-left: 5px; white-space: nowrap; overflow: hidden; }
        .bar-contest { position: absolute; height: 18px; border: 1px dashed #666; background: rgba(255,255,255,0.05); border-radius: 4px; z-index: 2; }
        .now-line { position: absolute; top: 0; bottom: 0; width: 2px; background: #ffeb3b; z-index: 5; pointer-events: none; box-shadow: 0 0 5px rgba(255,235,59,0.8); }

        /* 既存スタイル */
        .station-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .station-card { background: var(--card); border-left: 6px solid #555; padding: 12px; border-radius: 8px; }
        .station-card.own { border-color: var(--own); }
        .station-card.enemy { border-color: var(--enemy); }
        .summary-panel { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; border-top: 3px solid var(--own); padding: 15px; z-index: 1000; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; }
        .modal-content { background: #222; margin: 2% auto; padding: 15px; width: 90%; height: 90vh; border-radius: 10px; display: flex; flex-direction: column; }
    </style>
</head>
<body>

<div class="controls">
    <span style="color:#888; font-size:0.8rem;">v2.8.0</span>
    <button class="btn btn-add" onclick="showModal()">＋ 施設追加</button>
    <button class="btn" onclick="shareURL()">🔗 リンク発行</button>
    <button class="btn" onclick="exportData()">保存</button>
    <button class="btn" onclick="document.getElementById('import-file').click()">読込</button>
    <input type="file" id="import-file" style="display:none" onchange="importData(event)">
</div>

<div class="gantt-container">
    <div class="gantt-header-row">
        <div class="gantt-label-col">施設 / 日程</div>
        <div class="gantt-time-viewport" id="gantt-header-scroll">
            <div id="gantt-days" class="gantt-day-header" style="min-width: 1680px;"></div>
        </div>
    </div>
    <div style="display: flex; overflow-y: auto; max-height: 300px;">
        <div id="gantt-labels" style="width: 100px; flex-shrink: 0; border-right: 1px solid #444;"></div>
        <div class="gantt-time-viewport" id="gantt-body-scroll" onscroll="syncScroll(this)">
            <div id="gantt-body" class="gantt-time-canvas"></div>
        </div>
    </div>
</div>

<div id="station-list" class="station-grid"></div>

<div id="modal"><div class="modal-content"><div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;"><h3>施設追加</h3><button class="btn" onclick="hideModal()">閉じる</button></div><div style="display:flex; gap:8px; margin-bottom:15px;"><select id="f-type" onchange="onTypeChange()" style="flex:1;"><option value="">全施設</option></select></div><input type="text" id="f-search" placeholder="座標検索..." oninput="filterModal()" style="width:100%; padding:10px; margin-bottom:15px; background:#111; color:white; border:1px solid #444;"><div id="modal-list" style="flex: 1; overflow-y: auto;"></div></div></div>

<div class="summary-panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div id="summary-list" style="display:flex; gap:10px; overflow-x:auto; flex-grow:1; margin-right:10px;"></div>
        <button class="btn" style="background:var(--own); padding:15px 25px;" onclick="copySummaryText()">コピー</button>
    </div>
</div>

<script>
// --- 基本データ ---
const MASTER_DATA = { "construction": { "name": "建築", "coords": [{x:1068,y:138,lv:1},{x:537,y:138,lv:1},{x:138,y:138,lv:1},{x:138,y:666,lv:1},{x:138,y:1038,lv:1},{x:666,y:1068,lv:1},{x:1068,y:567,lv:1},{x:1068,y:1068,lv:1},{x:486,y:327,lv:3},{x:768,y:867,lv:3},{x:867,y:567,lv:3},{x:327,y:666,lv:3}] }, "defense": { "name": "防御", "coords": [{x:666,y:138,lv:2},{x:438,y:267,lv:2},{x:138,y:537,lv:2},{x:237,y:768,lv:2},{x:537,y:1038,lv:2},{x:738,y:957,lv:2},{x:1068,y:666,lv:2},{x:957,y:438,lv:2},{x:816,y:717,lv:4},{x:387,y:717,lv:4},{x:588,y:327,lv:4}] }, "tech": { "name": "技術", "coords": [{x:957,y:237,lv:1},{x:666,y:267,lv:1},{x:237,y:237,lv:1},{x:267,y:537,lv:1},{x:237,y:957,lv:1},{x:537,y:936,lv:1},{x:936,y:537,lv:1},{x:957,y:957,lv:1},{x:867,y:327,lv:3},{x:327,y:327,lv:3},{x:327,y:867,lv:3},{x:867,y:867,lv:3}] }, "weapon": { "name": "武器", "coords": [{x:867,y:138,lv:2},{x:366,y:138,lv:2},{x:138,y:438,lv:2},{x:138,y:867,lv:2},{x:438,y:1068,lv:2},{x:1068,y:327,lv:2},{x:1068,y:867,lv:2},{x:867,y:1068,lv:2},{x:816,y:486,lv:4},{x:387,y:486,lv:4},{x:588,y:867,lv:4}] }, "gathering": { "name": "採集", "coords": [{x:957,y:138,lv:1},{x:537,y:87,lv:1},{x:138,y:237,lv:1},{x:87,y:666,lv:1},{x:267,y:1068,lv:1},{x:636,y:1137,lv:1},{x:1137,y:567,lv:1},{x:1068,y:936,lv:1}] }, "production": { "name": "生産", "coords": [{x:1068,y:237,lv:1},{x:768,y:138,lv:1},{x:237,y:138,lv:1},{x:138,y:327,lv:1},{x:138,y:957,lv:1},{x:327,y:1038,lv:1},{x:1068,y:747,lv:1},{x:957,y:1068,lv:1}] }, "training": { "name": "訓練", "coords": [{x:237,y:486,lv:2},{x:138,y:747,lv:2},{x:486,y:957,lv:2},{x:768,y:1038,lv:2},{x:957,y:747,lv:2},{x:1068,y:486,lv:2},{x:486,y:138,lv:2},{x:768,y:237,lv:2}] }, "expedition": { "name": "遠征", "coords": [{x:768,y:327,lv:3},{x:327,y:567,lv:3},{x:486,y:867,lv:3},{x:867,y:666,lv:3}] } };
const ALL_STATIONS = []; Object.entries(MASTER_DATA).forEach(([k, cat]) => { cat.coords.forEach((c, i) => { ALL_STATIONS.push({ id:`${k}-${c.lv}-${i}`, typeKey:k, typeName:cat.name, lv:c.lv, x:c.x, y:c.y }); }); });

let userState = { selectedIds: [], timers: {}, modes: {} };
const STORAGE_KEY = 'wos_v280_master';
const DUR_PROTECT = 72 * 3600000;
const DUR_TOTAL = 96 * 3600000;
const EPOCH = 1735689600;

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(userState)); }

// --- スクロール同期 ---
function syncScroll(el) { document.getElementById('gantt-header-scroll').scrollLeft = el.scrollLeft; }

// --- ガントチャート描画 ---
function renderGantt() {
    const dayContainer = document.getElementById('gantt-days');
    const labelContainer = document.getElementById('gantt-labels');
    const bodyContainer = document.getElementById('gantt-body');
    const now = Date.now();
    const startTime = new Date().setHours(0,0,0,0); // 今日の 00:00
    const pxPerMs = 1680 / (7 * 24 * 3600000); // 7日間で1680px

    // 日付ヘッダー
    dayContainer.innerHTML = '';
    const dayNames = ['日','月','火','水','木','金','土'];
    for(let i=0; i<7; i++) {
        const d = new Date(startTime + i*86400000);
        dayContainer.innerHTML += `<div class="gantt-day-cell">${d.getMonth()+1}/${d.getDate()}(${dayNames[d.getDay()]})</div>`;
    }

    // ボディ
    labelContainer.innerHTML = '';
    bodyContainer.innerHTML = '';
    
    userState.selectedIds.forEach(id => {
        const s = ALL_STATIONS.find(x => x.id === id);
        const mode = userState.modes[id];
        const tStart = userState.timers[id];
        
        // ラベル
        labelContainer.innerHTML += `<div class="gantt-row" style="font-size:0.65rem; padding-left:5px; border-bottom:1px solid #222;">${s.typeName}Lv${s.lv}</div>`;
        
        // トラック
        const row = document.createElement('div');
        row.className = 'gantt-row';
        if (tStart) {
            // 表示範囲内（7日間）でループ計算
            let loopStart = tStart;
            while(loopStart + DUR_TOTAL < startTime) loopStart += DUR_TOTAL;
            
            // 最大2回分（重なり考慮）描画
            for(let i=0; i<2; i++) {
                const currentStart = loopStart + (i * DUR_TOTAL);
                const currentEnd = currentStart + DUR_PROTECT;
                const contestEnd = currentStart + DUR_TOTAL;

                const left = (currentStart - startTime) * pxPerMs;
                const protectWidth = DUR_PROTECT * pxPerMs;
                const contestWidth = (24 * 3600000) * pxPerMs;

                if (left + protectWidth + contestWidth > 0 && left < 1680) {
                    const color = mode === 'enemy' ? 'var(--enemy)' : 'var(--own)';
                    row.innerHTML += `<div class="bar-protect" style="left:${left}px; width:${protectWidth}px; background:${color}">${s.typeName}</div>`;
                    row.innerHTML += `<div class="bar-contest" style="left:${left + protectWidth}px; width:${contestWidth}px;"></div>`;
                }
            }
        }
        bodyContainer.appendChild(row);
    });

    // 現在時刻の線
    const nowPos = (now - startTime) * pxPerMs;
    bodyContainer.innerHTML += `<div class="now-line" style="left:${nowPos}px"></div>`;
}

function tick() {
    const now = Date.now();
    userState.selectedIds.forEach(id => {
        if(!userState.timers[id]) return;
        while (now > userState.timers[id] + DUR_TOTAL) { userState.timers[id] += DUR_TOTAL; save(); }
        const diff = (userState.timers[id] + DUR_PROTECT) - now;
        const el = document.getElementById(`t-${id}`);
        if(el) {
            if(diff <= 0) { el.innerText = "争奪中"; el.style.color="var(--accent)"; }
            else { el.innerText = `${Math.floor(diff/3600000)}h ${Math.floor((diff%3600000)/60000)}m ${Math.floor((diff%60000)/1000)}s`; el.style.color="#fff"; }
        }
    });
    renderGantt();
    updateSummary();
}

// --- 共通機能 (簡略化) ---
function render() {
    const grid = document.getElementById('station-list'); grid.innerHTML = '';
    userState.selectedIds.forEach(id => {
        const s = ALL_STATIONS.find(x => x.id === id); if(!s) return;
        const mode = userState.modes[id], t = userState.timers[id];
        const card = document.createElement('div'); card.className = `station-card ${mode}`;
        card.innerHTML = `
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                <div style="font-weight:bold; font-size:0.9rem;">${s.typeName} Lv.${s.lv} (${s.x},${s.y})</div>
                <span style="cursor:pointer; color:#777;" onclick="removeStation('${id}')">&times;</span>
            </div>
            <div style="display:flex; gap:5px; margin-bottom:10px;">
                <button class="btn" style="flex:1; background:${mode==='own'? 'var(--own)':'#333'}" onclick="setMode('${id}','own')">自</button>
                <button class="btn" style="flex:1; background:${mode==='enemy'? 'var(--enemy)':'#333'}" onclick="setMode('${id}','enemy')">敵</button>
            </div>
            ${t ? `<div id="t-${id}" style="font-size:1.8rem; font-family:monospace; font-weight:bold;">--:--:--</div>
                   <div style="display:flex; gap:5px; margin-top:5px;"><button class="btn" style="flex:1; background:#0277bd" onclick="sync('${id}')">同期</button><button class="btn" style="flex:1;" onclick="resetTimer('${id}')">リセット</button></div>`
                : `<button class="btn" style="width:100%; background:#2e7d32" onclick="startTimer('${id}')">保護開始(72h)</button>`}
        `;
        grid.appendChild(card);
    });
}

function updateSummary() {
    const now = Date.now();
    const sum = userState.selectedIds.filter(id => userState.timers[id]).map(id => {
        const s = ALL_STATIONS.find(x => x.id === id);
        return { name: `${s.typeName}${s.lv}`, diff: (userState.timers[id] + DUR_PROTECT) - now, mode: userState.modes[id] };
    }).sort((a,b) => a.diff - b.diff);
    document.getElementById('summary-list').innerHTML = sum.slice(0,5).map(i => `<div style="font-size:0.7rem; background:#222; padding:4px 8px; border-radius:4px; border-left:3px solid ${i.mode==='enemy'?'#f52':'#48f'}">${i.name}: ${i.diff<0?'争奪中':Math.floor(i.diff/3600000)+'h'}</div>`).join('');
}

function copySummaryText(){
    const now = Date.now();
    const items = userState.selectedIds.filter(id => userState.timers[id]).map(id => {
        const s = ALL_STATIONS.find(x => x.id === id);
        return { name: `${s.typeName}Lv${s.lv}`, x: s.x, y: s.y, diff: (userState.timers[id]+DUR_PROTECT)-now, mode: userState.modes[id] };
    }).sort((a,b) => a.diff - b.diff).filter(i => i.diff <= 24*3600000);
    if (!items.length) return;
    let lines = ["【状況報告】"];
    items.forEach(i => {
        let ts = i.diff <= 0 ? "争奪中!!" : `${Math.floor(i.diff/3600000)}h${Math.floor((i.diff%3600000)/60000)}m`;
        lines.push(`${i.mode==='enemy'?'●敵':'○自'}｜${i.name}｜${i.x},${i.y}｜${ts}`);
    });
    navigator.clipboard.writeText(lines.join("\n")).then(() => alert("コピーしました"));
}

function load() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved) userState = JSON.parse(saved);
    const tSel = document.getElementById('f-type');
    Object.entries(MASTER_DATA).forEach(([k, v]) => tSel.innerHTML += `<option value="${k}">${v.name}</option>`);
    render();
}

function setMode(id, m) { userState.modes[id] = m; save(); render(); }
function startTimer(id) { userState.timers[id] = Date.now(); save(); render(); }
function resetTimer(id) { if(confirm('？')) { delete userState.timers[id]; save(); render(); } }
function sync(id) {
    const v = prompt("残り (1d 09:11:27)"); if(!v) return;
    let s=0; const d=v.match(/(\d+)d/i); if(d) s+=d[1]*86400;
    const pts=v.replace(/\d+d/i,'').replace(/[:：\s]/g,' ').trim().split(/\s+/);
    if(pts.length===3) s+=pts[0]*3600+pts[1]*60+pts[2]*1;
    else if(pts.length===2) s+=pts[0]*3600+pts[1]*60;
    userState.timers[id]=Date.now()+(s*1000)-DUR_PROTECT; save(); render();
}
function showModal() { document.getElementById('modal').style.display = 'block'; filterModal(); }
function hideModal() { document.getElementById('modal').style.display = 'none'; }
function onTypeChange() { filterModal(); }
function filterModal() {
    const type = document.getElementById('f-type').value, search = document.getElementById('f-search').value, list = document.getElementById('modal-list');
    list.innerHTML = '';
    ALL_STATIONS.filter(s => (!type || s.typeKey === type) && (!search || s.x == search || s.y == search) && !userState.selectedIds.includes(s.id)).forEach(s => {
        const div = document.createElement('div'); div.style.padding="10px"; div.style.borderBottom="1px solid #333"; div.style.display="flex"; div.style.justifyContent="space-between";
        div.innerHTML = `<span>${s.typeName} Lv.${s.lv} (${s.x},${s.y})</span><button class="btn" onclick="addStation('${s.id}')">追加</button>`;
        list.appendChild(div);
    });
}
function addStation(id) { userState.selectedIds.push(id); userState.modes[id] = 'none'; save(); render(); filterModal(); }
function removeStation(id) { if(confirm('削除？')) { userState.selectedIds = userState.selectedIds.filter(x => x !== id); delete userState.timers[id]; delete userState.modes[id]; save(); render(); } }
function shareURL() { alert("v2.8.0ではローカル保存を優先しています。"); }
function exportData() { const b = new Blob([JSON.stringify(userState)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `wos_backup.json`; a.click(); }
function importData(e) { const r = new FileReader(); r.onload = (ev) => { try { userState = JSON.parse(ev.target.result); save(); render(); } catch(e){alert("失敗");} }; r.readAsText(e.target.files[0]); }

window.onload = () => { load(); setInterval(tick, 1000); };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[v2.8.1] ステーション管理</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #ff5252; --own: #448AFF; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; padding-bottom: 250px; }
        
        /* スマホ対応の大きなUI */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; position: sticky; top: 0; z-index: 100; background: #121212; padding: 10px 0; }
        .btn { cursor: pointer; padding: 20px; border: none; border-radius: 12px; background: #444; color: white; font-weight: bold; font-size: 1.1rem; }
        .btn:active { background: #666; }
        
        .gantt-container { background: #1a1a1a; padding: 10px; border-radius: 12px; margin-bottom: 20px; overflow-x: auto; }
        .gantt-canvas { height: 250px; width: 1680px; position: relative; border-left: 2px solid #555; }
        
        .station-grid { display: grid; gap: 15px; }
        .station-card { background: var(--card); padding: 20px; border-radius: 16px; border-left: 10px solid #555; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .station-card.own { border-color: var(--own); }
        .station-card.enemy { border-color: var(--accent); }
        
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 999; }
        .modal-content { padding: 20px; }
        select, input { width: 100%; padding: 20px; font-size: 1.2rem; border-radius: 12px; background: #222; color: #fff; border: 1px solid #555; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="controls">
    <button class="btn" style="background:#2e7d32;" onclick="showModal()">＋ 施設追加</button>
    <button class="btn" onclick="shareURL()">🔗 共有リンク発行</button>
</div>

<div class="gantt-container">
    <div id="gantt-body" class="gantt-canvas"></div>
</div>

<div id="station-list" class="station-grid"></div>

<div id="modal">
    <div class="modal-content">
        <button class="btn" style="width:100%; background:#666;" onclick="hideModal()">閉じる</button>
        <select id="f-type" onchange="filterModal()"><option value="">種別を選択...</option></select>
        <div id="modal-list"></div>
    </div>
</div>

<script>
const MASTER_DATA = { "construction": { "name": "建築", "coords": [{x:1068,y:138,lv:1},{x:486,y:327,lv:3}] }, "defense": { "name": "防御", "coords": [{x:666,y:138,lv:2},{x:816,y:717,lv:4}] } };
const ALL_STATIONS = []; Object.entries(MASTER_DATA).forEach(([k, cat]) => { cat.coords.forEach((c, i) => ALL_STATIONS.push({ id:`${k}-${c.lv}-${i}`, typeKey:k, typeName:cat.name, lv:c.lv, x:c.x, y:c.y })); });

let userState = { selectedIds: [], timers: {}, modes: {} };
const STORAGE_KEY = 'wos_v281_master';
const DUR_PROTECT = 72 * 3600000;
const DUR_TOTAL = 96 * 3600000;

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(userState)); }

function shareURL() {
    if (!userState.selectedIds.length) return alert("施設がありません");
    const parts = userState.selectedIds.map(id => {
        const idx = ALL_STATIONS.findIndex(s => s.id === id);
        const mode = userState.modes[id] === 'own' ? 1 : (userState.modes[id] === 'enemy' ? 2 : 0);
        const time = userState.timers[id] ? Math.floor(userState.timers[id]/1000 - 1735689600).toString(36) : "";
        return `${idx.toString(36)}.${mode}.${time}`;
    });
    const url = window.location.origin + window.location.pathname + "?v=" + parts.join('_');
    navigator.clipboard.writeText(url).then(() => alert("リンクをコピーしました！"));
}

function removeStation(id) {
    if (confirm('この施設をリストから削除してもよろしいですか？')) {
        userState.selectedIds = userState.selectedIds.filter(x => x !== id);
        delete userState.timers[id]; delete userState.modes[id];
        save(); render();
    }
}

function render() {
    const grid = document.getElementById('station-list'); grid.innerHTML = '';
    userState.selectedIds.forEach(id => {
        const s = ALL_STATIONS.find(x => x.id === id);
        const mode = userState.modes[id], t = userState.timers[id];
        const card = document.createElement('div'); card.className = `station-card ${mode}`;
        card.innerHTML = `
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <div style="font-size:1.2rem; font-weight:bold;">${s.typeName} Lv.${s.lv}</div>
                <button class="btn" style="padding:5px 15px;" onclick="removeStation('${id}')">削除</button>
            </div>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button class="btn" style="flex:1; background:${mode==='own'?'var(--own)':'#333'}" onclick="setMode('${id}','own')">自軍</button>
                <button class="btn" style="flex:1; background:${mode==='enemy'?'var(--accent)':'#333'}" onclick="setMode('${id}','enemy')">敵軍</button>
            </div>
            ${t ? `<div style="font-size:2rem; font-weight:bold; font-family:monospace;" id="t-${id}">--:--:--</div>` : `<button class="btn" style="width:100%; background:#2e7d32;" onclick="startTimer('${id}')">保護開始</button>`}
        `;
        grid.appendChild(card);
    });
}

function setMode(id, m) { userState.modes[id] = m; save(); render(); }
function startTimer(id) { userState.timers[id] = Date.now(); save(); render(); }
function showModal() { document.getElementById('modal').style.display = 'block'; }
function hideModal() { document.getElementById('modal').style.display = 'none'; }
function filterModal() {
    const type = document.getElementById('f-type').value, list = document.getElementById('modal-list'); list.innerHTML = '';
    ALL_STATIONS.filter(s => !type || s.typeKey === type).forEach(s => {
        list.innerHTML += `<div style="padding:15px; border-bottom:1px solid #444;" onclick="addStation('${s.id}')">${s.typeName} Lv.${s.lv} (${s.x},${s.y})</div>`;
    });
}
function addStation(id) { userState.selectedIds.push(id); save(); render(); hideModal(); }

window.onload = () => { 
    const saved = localStorage.getItem(STORAGE_KEY); if(saved) userState = JSON.parse(saved);
    const tSel = document.getElementById('f-type');
    Object.keys(MASTER_DATA).forEach(k => tSel.innerHTML += `<option value="${k}">${MASTER_DATA[k].name}</option>`);
    render(); 
};
</script>
</body>
</html>

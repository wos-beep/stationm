<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程ステーション管理 v1.7.0</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --txt: #e0e0e0; --accent: #bb86fc; --brd: #333; }
        body { font-family: sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 20px; line-height: 1.4; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--brd); padding-bottom: 10px; margin-bottom: 20px; }
        .clock-box { background: #000; padding: 10px; border: 1px solid var(--accent); border-radius: 5px; font-family: monospace; font-size: 0.9rem; }
        .controls { background: #252525; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .filter-group { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 10px; }
        
        /* フィルタボタンと個別リセットのセット */
        .filter-item { display: flex; align-items: center; background: #333; border-radius: 4px; overflow: hidden; }
        .filter-btn { cursor: pointer; padding: 6px 10px; border: none; color: white; font-size: 0.75rem; min-width: 80px; transition: opacity 0.2s; }
        .filter-btn.active { color: #000; font-weight: bold; }
        .filter-reset { cursor: pointer; background: rgba(255,255,255,0.1); border: none; color: #aaa; padding: 6px 6px; font-size: 0.7rem; border-left: 1px solid rgba(0,0,0,0.2); }
        .filter-reset:hover { background: rgba(255,255,255,0.2); color: #fff; }

        .station-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .station-card { background: var(--card); border: 1px solid var(--brd); border-left: 6px solid #ccc; padding: 15px; border-radius: 6px; position: relative; }
        .end-time { font-size: 0.85rem; color: #bb86fc; margin-top: 5px; font-weight: bold; }
        .countdown { font-size: 1.6rem; font-weight: bold; color: #ff5252; margin: 5px 0; font-family: monospace; }
        .btn { cursor: pointer; padding: 6px 10px; border: none; border-radius: 4px; background: #444; color: white; font-size: 0.85rem; }
        .btn-start { background: #2e7d32; width: 100%; font-weight: bold; margin-top: 10px; height: 40px; }
        .btn-sync { background: #0277bd; font-weight: bold; }
        .btn-reset { background: #c62828; font-size: 0.75rem; }
        .btn-io { background: #4527a0; font-size: 0.8rem; }
        .adjust-group { display: flex; gap: 6px; margin-top: 10px; align-items: center; }
        .close-card { position: absolute; top: 10px; right: 10px; color: #888; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>

<header>
    <h2>工程管理 <small style="font-size:0.5em; color:#888;">v1.7.0 (個別非表示解除)</small></h2>
    <div class="clock-box">
        <div>JST: <span id="jst">--:--:--</span></div>
        <div>UTC: <span id="utc">--:--:--</span></div>
    </div>
</header>

<div class="controls">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div class="io-section">
            <button class="btn btn-io" onclick="exportData()">データ保存</button>
            <button class="btn btn-io" onclick="document.getElementById('import-file').click()">読込</button>
            <input type="file" id="import-file" style="display:none" onchange="importData(event)">
        </div>
        <button class="btn" style="font-size:0.75rem;" onclick="resetHiddenAll()">すべての非表示を戻す</button>
    </div>
    <div id="filter-container" class="filter-group"></div>
</div>

<div class="station-grid" id="station-list"></div>

<script>
const MASTER_DATA = {
    "construction": { "name": "建築", "color": "#FF5252", "coords": [{"x": 1068, "y": 138, "lv": 1}, {"x": 537, "y": 138, "lv": 1}, {"x": 138, "y": 138, "lv": 1}, {"x": 138, "y": 666, "lv": 1}, {"x": 138, "y": 1038, "lv": 1}, {"x": 666, "y": 1068, "lv": 1}, {"x": 1068, "y": 567, "lv": 1}, {"x": 1068, "y": 1068, "lv": 1}, {"x": 486, "y": 327, "lv": 3}, {"x": 768, "y": 867, "lv": 3}, {"x": 867, "y": 567, "lv": 3}, {"x": 327, "y": 666, "lv": 3}]},
    "defense": { "name": "防御", "color": "#448AFF", "coords": [{"x": 666, "y": 138, "lv": 2}, {"x": 438, "y": 267, "lv": 2}, {"x": 138, "y": 537, "lv": 2}, {"x": 237, "y": 768, "lv": 2}, {"x": 537, "y": 1038, "lv": 2}, {"x": 738, "y": 957, "lv": 2}, {"x": 1068, "y": 666, "lv": 2}, {"x": 957, "y": 438, "lv": 2}, {"x": 816, "y": 717, "lv": 4}, {"x": 387, "y": 717, "lv": 4}, {"x": 588, "y": 327, "lv": 4}]},
    "tech": { "name": "技術", "color": "#FFEB3B", "coords": [{"x": 957, "y": 237, "lv": 1}, {"x": 666, "y": 267, "lv": 1}, {"x": 237, "y": 237, "lv": 1}, {"x": 267, "y": 537, "lv": 1}, {"x": 237, "y": 957, "lv": 1}, {"x": 537, "y": 936, "lv": 1}, {"x": 936, "y": 537, "lv": 1}, {"x": 957, "y": 957, "lv": 1}, {"x": 867, "y": 327, "lv": 3}, {"x": 327, "y": 327, "lv": 3}, {"x": 327, "y": 867, "lv": 3}, {"x": 867, "y": 867, "lv": 3}]},
    "weapon": { "name": "武器", "color": "#E040FB", "coords": [{"x": 867, "y": 138, "lv": 2}, {"x": 366, "y": 138, "lv": 2}, {"x": 138, "y": 438, "lv": 2}, {"x": 138, "y": 867, "lv": 2}, {"x": 438, "y": 1068, "lv": 2}, {"x": 1068, "y": 327, "lv": 2}, {"x": 1068, "y": 867, "lv": 2}, {"x": 867, "y": 1068, "lv": 2}, {"x": 816, "y": 486, "lv": 4}, {"x": 387, "y": 486, "lv": 4}, {"x": 588, "y": 867, "lv": 4}]},
    "gathering": { "name": "採取", "color": "#4CAF50", "coords": [{"x": 957, "y": 138, "lv": 1}, {"x": 537, "y": 87, "lv": 1}, {"x": 138, "y": 237, "lv": 1}, {"x": 87, "y": 666, "lv": 1}, {"x": 267, "y": 1068, "lv": 1}, {"x": 636, "y": 1137, "lv": 1}, {"x": 1137, "y": 567, "lv": 1}, {"x": 1068, "y": 936, "lv": 1}]},
    "production": { "name": "生産", "color": "#FF9800", "coords": [{"x": 1068, "y": 237, "lv": 1}, {"x": 768, "y": 138, "lv": 1}, {"x": 237, "y": 138, "lv": 1}, {"x": 138, "y": 327, "lv": 1}, {"x": 138, "y": 957, "lv": 1}, {"x": 327, "y": 1038, "lv": 1}, {"x": 1068, "y": 747, "lv": 1}, {"x": 957, "y": 1068, "lv": 1}]},
    "training": { "name": "訓練", "color": "#795548", "coords": [{"x": 237, "y": 486, "lv": 2}, {"x": 138, "y": 747, "lv": 2}, {"x": 486, "y": 957, "lv": 2}, {"x": 768, "y": 1038, "lv": 2}, {"x": 957, "y": 747, "lv": 2}, {"x": 1068, "y": 486, "lv": 2}, {"x": 486, "y": 138, "lv": 2}, {"x": 768, "y": 237, "lv": 2}]},
    "expedition": { "name": "遠征", "color": "#607D8B", "coords": [{"x": 768, "y": 327, "lv": 3}, {"x": 327, "y": 567, "lv": 3}, {"x": 486, "y": 867, "lv": 3}, {"x": 867, "y": 666, "lv": 3}]}
};

const FILTER_LIST = [];
Object.entries(MASTER_DATA).forEach(([typeKey, val]) => {
    const lvs = [...new Set(val.coords.map(c => c.lv))].sort();
    lvs.forEach(lv => FILTER_LIST.push({ key: `${typeKey}-${lv}`, type: typeKey, lv: lv, name: `${val.name} Lv.${lv}`, color: val.color }));
});

let userState = { active: ["construction-1"], timers: {}, hidden: [] };
const DUR = 72 * 60 * 60 * 1000;
const STORAGE_KEY = 'wos_station_manager_data';

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(userState)); }
function load() {
    const s = localStorage.getItem(STORAGE_KEY);
    if(s) userState = JSON.parse(s);
}

function render() {
    const f = document.getElementById('filter-container');
    f.innerHTML = '';
    FILTER_LIST.forEach(item => {
        const wrap = document.createElement('div');
        wrap.className = 'filter-item';

        const btn = document.createElement('button');
        const act = userState.active.includes(item.key);
        btn.className = `filter-btn ${act?'active':''}`;
        btn.style.backgroundColor = act ? item.color : '#333';
        btn.innerText = item.name;
        btn.onclick = () => {
            userState.active = act ? userState.active.filter(x=>x!==item.key) : [...userState.active, item.key];
            save(); render();
        };

        const res = document.createElement('button');
        res.className = 'filter-reset';
        res.innerHTML = '↺';
        res.title = `${item.name}の非表示をすべて戻す`;
        res.onclick = (e) => {
            e.stopPropagation();
            if(confirm(`${item.name} の非表示を解除しますか？`)) {
                // そのタイプとLvに合致するIDのみ削除
                const prefix = `${item.type}-${item.lv}-`;
                userState.hidden = userState.hidden.filter(id => !id.startsWith(prefix));
                save(); render();
            }
        };

        wrap.appendChild(btn);
        wrap.appendChild(res);
        f.appendChild(wrap);
    });

    const l = document.getElementById('station-list');
    l.innerHTML = '';
    FILTER_LIST.forEach(item => {
        if (!userState.active.includes(item.key)) return;
        MASTER_DATA[item.type].coords.filter(c => c.lv === item.lv).forEach((c, i) => {
            const id = `${item.type}-${item.lv}-${i}`;
            if (userState.hidden.includes(id)) return;

            const card = document.createElement('div');
            card.className = 'station-card';
            card.style.borderLeftColor = item.color;
            const t = userState.timers[id];
            
            let content = `<span class="close-card" onclick="hideCard('${id}')">&times;</span>
                           <div style="font-weight:bold">${item.name}</div>
                           <div style="color:#888; font-size:0.75rem">座標: (${c.x}, ${c.y})</div>`;

            if (t) {
                const ed = new Date(t + DUR);
                content += `<div class="end-time">終了予定: ${ed.getMonth()+1}/${ed.getDate()} ${ed.getHours().toString().padStart(2,'0')}:${ed.getMinutes().toString().padStart(2,'0')}</div>
                            <div class="countdown" id="t-${id}">--:--:--</div>
                            <div class="adjust-group">
                                <button class="btn btn-sync" onclick="syncTimer('${id}')">残り同期</button>
                                <button class="btn btn-reset" style="margin-left:auto" onclick="reset('${id}')">解除</button>
                            </div>`;
            } else {
                content += `<button class="btn btn-start" onclick="start('${id}')">保護開始 (72h)</button>`;
            }
            card.innerHTML = content;
            l.appendChild(card);
        });
    });
}

function syncTimer(id) {
    const input = prompt("残り時間を入力 (例: 1d 09:11:27)", "");
    if (!input) return;
    let totalSeconds = 0;
    const dayMatch = input.match(/(\d+)d/i);
    if (dayMatch) totalSeconds += parseInt(dayMatch[1]) * 86400;
    const timePart = input.replace(/\d+d/i, '').trim();
    const parts = timePart.replace(/[:：\s]/g, ' ').trim().split(/\s+/);
    let h=0, m=0, s=0;
    if (parts.length === 3) { h=parseInt(parts[0]); m=parseInt(parts[1]); s=parseInt(parts[2]); }
    else if (parts.length === 2) { h=parseInt(parts[0]); m=parseInt(parts[1]); }
    else if (parts.length === 1 && parts[0]!=="") { h=parseInt(parts[0]); }
    totalSeconds += (h * 3600) + (m * 60) + s;
    userState.timers[id] = Date.now() + (totalSeconds * 1000) - DUR;
    save(); render();
}

function start(id) { userState.timers[id] = Date.now(); save(); render(); }
function reset(id) { if(confirm('解除しますか？')) { delete userState.timers[id]; save(); render(); } }
function hideCard(id) { userState.hidden.push(id); save(); render(); }
function resetHiddenAll() { if(confirm('すべての非表示を解除しますか？')) { userState.hidden = []; save(); render(); } }

function tick() {
    const n = new Date();
    document.getElementById('jst').innerText = n.toLocaleString('ja-JP');
    document.getElementById('utc').innerText = n.toISOString().replace('T',' ').substring(0,19);
    Object.keys(userState.timers).forEach(id => {
        const el = document.getElementById(`t-${id}`);
        if(!el) return;
        const diff = (userState.timers[id] + DUR) - Date.now();
        if(diff <= 0) { el.innerText = "保護終了"; el.style.color = "#888"; }
        else {
            const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
            el.innerText = `${h}h ${m}m ${s}s`;
        }
    });
}

function exportData() {
    const blob = new Blob([JSON.stringify(userState, null, 2)], {type: 'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `wos_station_backup.json`; a.click();
}
function importData(e) {
    const reader = new FileReader();
    reader.onload = (event) => { try { userState = JSON.parse(event.target.result); save(); render(); } catch(err) { alert("Invalid file"); } };
    reader.readAsText(e.target.files[0]);
}

window.onload = () => { load(); render(); setInterval(tick, 1000); };
</script>
</body>
</html>

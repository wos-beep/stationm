<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[v2.9.1] 施設管理-メイン</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="version-tag">UI: v2.9.1</div>
    
    <div class="controls">
        <button class="btn btn-add" onclick="showModal()">＋ 追加</button>
        <button class="btn" onclick="shareURL()">🔗 共有リンク</button>
        <div class="data-group">
            <button class="btn" onclick="exportData()">💾 保存(JSON)</button>
            <button class="btn" onclick="document.getElementById('import-file').click()">📂 読込</button>
            <input type="file" id="import-file" style="display:none" onchange="importData(event)">
        </div>
    </div>

    <div id="station-list" class="station-grid"></div>

    <div id="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>施設追加</h3>
                <button class="btn" onclick="hideModal()">閉じる</button>
            </div>
            <div class="modal-filter">
                <select id="f-type" onchange="onTypeChange()"><option value="">全施設</option></select>
                <select id="f-lv" onchange="filterModal()"><option value="">全Lv</option></select>
                <input type="text" id="f-search" placeholder="座標検索..." oninput="filterModal()">
            </div>
            <div id="modal-list"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
